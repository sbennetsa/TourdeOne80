<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin:0; }
</style>
</helmet>

<div style="font-family:'Barlow',sans-serif;color:#eef2fb;background:#0b1436;background-image:radial-gradient(circle at 50% 8%,rgba(53,200,240,0.10),transparent 55%),repeating-linear-gradient(135deg,rgba(255,255,255,0.012) 0,rgba(255,255,255,0.012) 1px,transparent 1px,transparent 10px);min-height:100vh;">

  <!-- jersey stripe -->
  <div style="height:5px;display:flex;"><div style="flex:1;background:#f2c200;"></div><div style="flex:1;background:#23b061;"></div><div style="flex:1;background:#e2384f;"></div><div style="flex:1;background:#e7ecfb;"></div><div style="flex:1;background:#8a2f3f;"></div></div>

  <!-- NAV with 5C wheel-in-motion mark -->
  <nav style="display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:1px solid rgba(43,55,110,0.5);max-width:1240px;margin:0 auto;">
    <div style="display:flex;align-items:center;gap:13px;">
      <svg viewBox="0 0 118 100" width="56" height="47" style="flex:none;">
        <line x1="2" y1="34" x2="26" y2="34" stroke="rgba(53,200,240,0.5)" stroke-width="2.4" stroke-linecap="round"></line>
        <line x1="0" y1="50" x2="30" y2="50" stroke="rgba(53,200,240,0.75)" stroke-width="2.4" stroke-linecap="round"></line>
        <line x1="4" y1="66" x2="26" y2="66" stroke="rgba(53,200,240,0.5)" stroke-width="2.4" stroke-linecap="round"></line>
        <circle cx="68" cy="50" r="45" fill="#0b1436" stroke="#35c8f0" stroke-width="4"></circle>
        <g stroke="rgba(53,200,240,0.55)" stroke-width="1.6"><line x1="68" y1="50" x2="106" y2="50"></line><line x1="68" y1="50" x2="94.9" y2="76.9"></line><line x1="68" y1="50" x2="68" y2="88"></line><line x1="68" y1="50" x2="41.1" y2="76.9"></line><line x1="68" y1="50" x2="30" y2="50"></line><line x1="68" y1="50" x2="41.1" y2="23.1"></line><line x1="68" y1="50" x2="68" y2="12"></line><line x1="68" y1="50" x2="94.9" y2="23.1"></line></g>
        <circle cx="68" cy="50" r="6" fill="#35c8f0"></circle>
      </svg>
      <div style="line-height:1;">
        <div style="font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:4px;font-size:9px;color:#8b98c4;font-weight:600;margin-bottom:2px;">Tour&nbsp;De</div>
        <div style="font-family:'Bebas Neue';font-size:30px;letter-spacing:1px;color:#eef2fb;">ONE<span style="color:#35c8f0;">80</span></div>
      </div>
    </div>
    <div style="display:flex;gap:26px;font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:1.5px;font-size:12px;font-weight:600;color:#8b98c4;align-items:center;">
      <span>Stages</span><span>Riders</span><span>Leaderboard</span>
      <span style="background:#2b50e0;color:#fff;border-radius:999px;padding:9px 18px;">Join</span>
    </div>
  </nav>

  <!-- HERO (3B) -->
  <div style="max-width:1240px;margin:0 auto;padding:78px 40px 64px;text-align:center;">
    <div style="font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:9px;font-size:17px;color:#8b98c4;font-weight:600;margin-bottom:14px;padding-left:9px;">Tour&nbsp;&middot;&nbsp;De</div>
    <div style="font-family:'Bebas Neue';font-size:160px;line-height:0.74;letter-spacing:3px;color:#eef2fb;">ONE<span style="color:#35c8f0;">80</span></div>
    <div style="height:3px;width:360px;max-width:70%;margin:26px auto 14px;background:linear-gradient(90deg,transparent,#35c8f0,transparent);"></div>
    <div style="font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:8px;font-size:14px;font-weight:600;color:#5f6da0;">Virtual Grand Tour &middot; 2026</div>
    <p style="max-width:500px;margin:28px auto 32px;color:#93a0c8;font-size:16px;line-height:1.6;">21 stages. 23 days. One peloton of friends chasing the yellow jersey across a Zwift &amp; TrainingPeaks grand tour.</p>
    <div style="display:flex;gap:12px;justify-content:center;">
      <div style="background:#2b50e0;color:#fff;border-radius:999px;padding:14px 28px;font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:1.5px;font-size:13px;font-weight:700;cursor:pointer;">Enter The Tour</div>
      <div style="background:transparent;color:#eef2fb;border:1px solid #2b376e;border-radius:999px;padding:14px 28px;font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:1.5px;font-size:13px;font-weight:700;cursor:pointer;">View Leaderboard</div>
    </div>
  </div>

  <!-- STAT STRIP -->
  <div style="max-width:1240px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid rgba(43,55,110,0.5);border-bottom:1px solid rgba(43,55,110,0.5);">
    <div style="padding:22px;text-align:center;border-right:1px solid rgba(43,55,110,0.4);"><div style="font-family:'Bebas Neue';font-size:40px;color:#35c8f0;line-height:1;">21</div><div style="font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:2px;font-size:10px;color:#5f6da0;font-weight:700;margin-top:4px;">Stages</div></div>
    <div style="padding:22px;text-align:center;border-right:1px solid rgba(43,55,110,0.4);"><div style="font-family:'Bebas Neue';font-size:40px;color:#35c8f0;line-height:1;">23</div><div style="font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:2px;font-size:10px;color:#5f6da0;font-weight:700;margin-top:4px;">Days</div></div>
    <div style="padding:22px;text-align:center;border-right:1px solid rgba(43,55,110,0.4);"><div style="font-family:'Bebas Neue';font-size:40px;color:#35c8f0;line-height:1;">7</div><div style="font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:2px;font-size:10px;color:#5f6da0;font-weight:700;margin-top:4px;">Riders</div></div>
    <div style="padding:22px;text-align:center;"><div style="font-family:'Bebas Neue';font-size:40px;color:#35c8f0;line-height:1;">5</div><div style="font-family:'Barlow Semi Condensed';text-transform:uppercase;letter-spacing:2px;font-size:10px;color:#5f6da0;font-weight:700;margin-top:4px;">Jerseys</div></div>
  </div>

</div>
</x-dc>
</body>
</html>
