version: '3.8'

services:
  app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    working_dir: /app

  build:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: npm run build
    environment:
      - NODE_ENV=production

  test:
    build: .
    volumes:
      - .:/app
      - /app/node_modules
    working_dir: /app
    command: npm run test
    environment:
      - NODE_ENV=test
